
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 사회 수업 PPT 자동 생성 플랫폼</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#f3f5f9;
margin:0;
}

header{
background:#1e40af;
color:white;
padding:18px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.section{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
border:1px solid #ddd;
}

button{
padding:12px 18px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
font-size:16px;
}

select{
padding:10px;
margin-top:10px;
font-size:16px;
}

.slides{
display:grid;
gap:16px;
margin-top:20px;
}

.slide{
background:white;
padding:22px;
border-radius:12px;
border:1px solid #ddd;
}

.quiz{
background:#eef4ff;
padding:15px;
border-radius:8px;
}

.comic{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.panel{
flex:1;
background:#fff6b3;
padding:10px;
border-radius:8px;
min-width:120px;
}
</style>

<script>

const lessons={

"인권 보장과 기본권":{
concept:"헌법은 인간의 존엄성과 기본권을 보장한다.",
news:"AI 얼굴 인식 기술 확대와 개인정보 보호 문제가 사회적 논쟁이 되고 있다.",
comic:["CCTV가 많으면 더 안전할까?","하지만 사생활 침해도 있을 수 있어.","그래서 기본권이 중요해."],
quiz:{
q:"다음 중 기본권은 무엇일까요?",
choices:["표현의 자유","가격 경쟁","기업 이윤","주식 투자"],
answer:"표현의 자유"
}
},

"인권 침해와 구제":{
concept:"인권 침해는 헌법소원이나 국가인권위원회를 통해 구제받을 수 있다.",
news:"학교 사이버 괴롭힘 대응 정책이 강화되고 있다.",
comic:["SNS 놀림도 인권 침해일까?","심하면 침해야.","그래서 구제 제도가 있어."],
quiz:{
q:"인권 침해 구제 기관은 무엇일까요?",
choices:["국가인권위원회","은행","마트","병원"],
answer:"국가인권위원회"
}
}

}

function generateSlides(){

let unit=document.getElementById("unit").value
let data=lessons[unit]

let slides=document.getElementById("slides")
slides.innerHTML=""

for(let i=1;i<=30;i++){

let content=""

if(i==1){
content=`<h2>${unit}</h2><p>수업 목표와 단원 소개</p>`
}

else if(i<=5){
content=`<h3>핵심 개념</h3><p>${data.concept}</p>`
}

else if(i<=10){
content=`<h3>뉴스 사례</h3><p>${data.news}</p>`
}

else if(i<=15){
content=`<h3>개념 만화</h3>
<div class="comic">
<div class="panel">${data.comic[0]}</div>
<div class="panel">${data.comic[1]}</div>
<div class="panel">${data.comic[2]}</div>
</div>`
}

else if(i<=20){
content=`<h3>토론 질문</h3>
<p>이 사례에서 인권은 어떻게 보호되어야 할까요?</p>`
}

else if(i<=25){

let choices=data.quiz.choices.map(c=>`<button onclick="check('${c}','${data.quiz.answer}')">${c}</button>`).join("<br><br>")

content=`<h3>퀴즈</h3>
<div class="quiz">
<p>${data.quiz.q}</p>
${choices}
</div>`
}

else{
content=`<h3>수업 정리</h3>
<p>오늘 배운 내용을 친구와 정리해 보세요.</p>`
}

slides.innerHTML+=`<div class="slide">${content}</div>`

}

}

function check(choice,answer){

if(choice===answer){
alert("정답입니다!")
}else{
alert("다시 생각해 보세요!")
}

}

</script>

</head>

<body>

<header>
<h1>📚 AI 사회 수업 PPT 생성 플랫폼</h1>
<p>클릭 한번 → PPT 30장 자동 생성</p>
</header>

<div class="container">

<div class="section">
<h2>단원 선택</h2>

<select id="unit">
<option>인권 보장과 기본권</option>
<option>인권 침해와 구제</option>
</select>

<br>

<button onclick="generateSlides()">PPT 30장 생성</button>
</div>

<div class="slides" id="slides"></div>

<div class="section">
<h2>PPT / PDF 저장</h2>
<button onclick="window.print()">PDF 저장</button>
</div>

</div>

</body>
</html>
